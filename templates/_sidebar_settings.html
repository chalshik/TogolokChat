<div class="sidebar-view" id="settings-view">
<div class="sidebar-view-header">
    <span class="view-title">Жөндөөлөр</span>
    <button class="close-sidebar-view-btn" data-target-view="chats">&times;</button>
</div>
<div class="settings-options">
    <button class="btn settings-btn" id="admin-page-btn" onclick="document.getElementById('admin-modal').style.display='flex'; event.preventDefault(); event.stopImmediatePropagation(); return false;">Админдик бетке өтүү</button>
    <button class="btn settings-btn" id="change-password-btn">Сыр сөздү өзгөртүү</button>
    <div class="language-setting">
        <label for="language-select">Тил өзгөртүү:</label>
        <select id="language-select" class="btn settings-btn">
            <option value="ky" selected>Кыргызча</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <!-- Add other languages as needed -->
        </select>
    </div>
</div>
</div>

<!-- Admin Modal -->
<div id="admin-modal" class="modal" onclick="if(event.target === this) { this.style.display='none'; }">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Админ</h2>
            <span class="close-modal" onclick="document.getElementById('admin-modal').style.display='none';">&times;</span>
        </div>
        <div class="modal-body">
            <input type="password" id="admin-password" placeholder="Админдин сыр сөзү" class="form-control">
            <button id="admin-login-btn" class="btn">Кирүү</button>
        </div>
    </div>
</div>
