<div class="sidebar-view" id="settings-view">
<div class="sidebar-view-header">
    <span class="view-title">Жөндөөлөр</span>
    <button class="close-sidebar-view-btn" data-target-view="chats">&times;</button>
</div>
<div class="settings-options">
    <button class="btn settings-btn" id="admin-page-btn" onclick="document.getElementById('admin-modal').style.display='flex'; console.log('Admin button clicked (inline)'); return false;">Админдик бетке өтүү</button>
    <button class="btn settings-btn" id="change-password-btn">Сыр сөздү өзгөртүү</button>
    <div class="language-setting">
        <label for="language-select">Тил өзгөртүү:</label>
        <select id="language-select" class="btn settings-btn">
            <option value="ky" selected>Кыргызча</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <!-- Add other languages as needed -->
        </select>
    </div>
</div>
</div>

<!-- Admin Modal -->
<div id="admin-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Админ</h2>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <input type="password" id="admin-password" placeholder="Админдин сыр сөзү" class="form-control">
            <button id="admin-login-btn" class="btn">Кирүү</button>
        </div>
    </div>
</div>

<style>
/* Modal Styles */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: rgba(242, 242, 242, 0.95);
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    width: 320px;
    max-width: 90%;
    padding: 15px;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: none;
}

.modal-header h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    flex-grow: 1;
}

.close-modal {
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    opacity: 0.8;
    position: absolute;
    right: 15px;
    top: 15px;
}

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding: 0;
}

.modal-body input {
    padding: 12px 15px;
    border: none;
    border-radius: 30px;
    width: 100%;
    box-sizing: border-box;
    font-size: 15px;
    background-color: white;
    text-align: center;
}

.modal-body button {
    padding: 10px 20px;
    background-color: #e0e0e0;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    width: 50%;
    font-size: 16px;
    font-weight: 500;
    align-self: center;
    margin-top: 5px;
}

.modal-body button:hover {
    background-color: #d0d0d0;
}
</style>

<script>
// Debug helper
function debugLog(message) {
    console.log('SETTINGS DEBUG: ' + message);
    // Also output to visible element if needed
    const debugElement = document.createElement('div');
    debugElement.style.position = 'fixed';
    debugElement.style.bottom = '10px';
    debugElement.style.right = '10px';
    debugElement.style.background = 'rgba(0,0,0,0.7)';
    debugElement.style.color = 'white';
    debugElement.style.padding = '5px';
    debugElement.style.zIndex = '9999';
    debugElement.textContent = message;
    document.body.appendChild(debugElement);
    setTimeout(() => debugElement.remove(), 3000);
}

// Custom implementation for settings buttons
(function() {
    debugLog('Script started');
    
    // Function to initialize all settings buttons
    function initializeSettingsButtons() {
        debugLog('Initializing settings buttons');
        
        try {
            // Admin button & modal functionality
            const adminModal = document.getElementById('admin-modal');
            const adminBtn = document.getElementById('admin-page-btn');
            
            debugLog('Elements found: ' + 
                     'adminModal=' + (adminModal ? 'yes' : 'no') + 
                     ', adminBtn=' + (adminBtn ? 'yes' : 'no'));
            
            if (adminBtn && adminModal) {
                // Direct add, no cloning
                adminBtn.addEventListener('click', function(e) {
                    debugLog('Admin button clicked (JS)');
                    adminModal.style.display = 'flex';
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                });
                
                // Fallback global function
                window.openAdminModal = function() {
                    debugLog('Global openAdminModal called');
                    if (adminModal) adminModal.style.display = 'flex';
                    return false;
                };
                
                // Add attribute to button for debugging
                adminBtn.setAttribute('data-has-handler', 'true');
                
                // Also try direct property assignment
                adminBtn.onclick = function(e) {
                    debugLog('Admin button onclick property triggered');
                    adminModal.style.display = 'flex';
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                };
            }
            
            // Close modal handlers
            const closeModalBtn = document.querySelector('.close-modal');
            if (closeModalBtn && adminModal) {
                closeModalBtn.addEventListener('click', function() {
                    debugLog('Close button clicked');
                    adminModal.style.display = 'none';
                });
            }
            
            // Close when clicking outside modal
            if (adminModal) {
                adminModal.addEventListener('click', function(e) {
                    if (e.target === adminModal) {
                        debugLog('Outside modal clicked');
                        adminModal.style.display = 'none';
                    }
                });
            }
        } catch (err) {
            console.error('Error in settings initialization:', err);
            debugLog('Error: ' + err.message);
        }
    }
    
    // Initialize immediately
    initializeSettingsButtons();
    
    // Also initialize when the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', initializeSettingsButtons);
    
    // And again after a short delay to ensure we override any other listeners
    setTimeout(initializeSettingsButtons, 200);
    
    // Add a global trigger function as a last resort
    window.debugSettings = function() {
        debugLog('Debug function called');
        const modal = document.getElementById('admin-modal');
        if (modal) {
            modal.style.display = 'flex';
            return 'Modal shown';
        }
        return 'Modal not found';
    };
})();
</script>
